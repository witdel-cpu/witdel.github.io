<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Spyfall – แจกบทบาท (60 สถานที่)</title>
  <style>
    :root{ --bg:#0f172a; --card:#111827; --fg:#e5e7eb; --muted:#94a3b8; --accent:#22c55e; --danger:#ef4444; }
    *{box-sizing:border-box} body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans Thai",sans-serif; background:var(--bg); color:var(--fg)}
    .wrap{max-width:640px; margin:0 auto; padding:16px 14px 96px} .card{background:var(--card); border-radius:18px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:8px 0 4px; font-size:1.6rem} h2{margin:0 0 8px; font-size:1.1rem; color:var(--muted)} label{display:block; margin:10px 0 6px; color:var(--muted)}
    select{width:100%; background:#0b1220; color:var(--fg); border:1px solid #243045; border-radius:12px; padding:12px 14px; font-size:1.05rem}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 16px; font-weight:700; border:none; border-radius:14px; cursor:pointer}
    .btn.full{width:100%}
    .primary{background:var(--accent); color:#052e16} .secondary{background:#1e293b; color:#e2e8f0} .danger{background:var(--danger); color:#fff}
    .center{text-align:center} .muted{color:var(--muted)} .big{font-size:1.35rem; font-weight:800} .mt8{margin-top:8px} .mt12{margin-top:12px} .mt16{margin-top:16px} .mt24{margin-top:24px}
    .hidden{display:none !important} .pill{display:inline-block; background:#0b1220; border:1px solid #26344d; padding:6px 10px; border-radius:999px; color:#c7d2fe}
    .footer{position:fixed; left:0; right:0; bottom:0; background:linear-gradient(180deg, rgba(15,23,42,0) 0%, rgba(15,23,42,1) 40%); padding:18px 14px}
    .footer .wrap{padding-bottom:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Spyfall – แจกบทบาท</h1>
      <p class="muted">เลือกจำนวนผู้เล่นและจำนวนสายลับ → แจกบทบาททีละคน (สุ่มจาก 60 สถานที่, บทบาทย่อยสูงสุด 8)</p>

      <section id="setup">
        <h2>ตั้งค่า</h2>
        <label for="players">จำนวนผู้เล่น (3–10)</label>
        <select id="players">
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>

        <label for="spyMode">จำนวนสายลับ</label>
        <div class="row">
          <select id="spyMode" class="full">
            <option value="1" selected>บังคับ 1 คน</option>
            <option value="2">บังคับ 2 คน</option>
            <option value="3">บังคับ 3 คน</option>
          </select>
        </div>

        <div class="row mt16">
          <button id="btnStart" class="btn primary big full">เริ่มเกม</button>
        </div>
      </section>

      <section id="pass" class="hidden center">
        <h2>ถึงคิวผู้เล่น</h2>
        <div class="big">ส่งเครื่องให้ <span id="playerNo" class="pill">คนที่ 1</span></div>
        <button id="btnReveal" class="btn primary big mt16 full">เปิดเผยบทบาท</button>
        <button id="btnBackSetup" class="btn secondary mt8">ย้อนกลับ</button>
      </section>

      <section id="reveal" class="hidden center">
        <div id="roleBadge" class="pill">บทบาทของคุณ</div>
        <h1 id="roleTitle" class="mt16">คุณคือ ...</h1>
        <p id="roleDesc" class="mt12"></p>
        <div class="mt16">
          <button id="btnHideNext" class="btn primary big full">ซ่อน & ไปคนถัดไป</button>
        </div>
      </section>

      <section id="ready" class="hidden center">
        <h1>แจกบทบาทครบแล้ว</h1>
        <p class="muted">เริ่มเล่นได้เลย โทรศัพท์ไม่ต้องใช้อีกแล้ว</p>
        <div class="row mt16">
          <button id="btnShowSpy" class="btn danger">เฉลยสายลับ</button>
          <button id="btnReset" class="btn secondary">เริ่มรอบใหม่</button>
        </div>
        <p id="spyReveal" class="mt12 big hidden"></p>
      </section>
    </div>
  </div>

  <div class="footer">
    <div class="wrap">
      <div class="row">
        <button id="footerReset" class="btn danger">รีเซ็ตด่วน</button>
        <button id="footerNewRound" class="btn secondary">สุ่มรอบใหม่</button>
      </div>
    </div>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const el = {
    setup: $('#setup'), pass: $('#pass'), reveal: $('#reveal'), ready: $('#ready'),
    players: $('#players'), spyMode: $('#spyMode'), btnStart: $('#btnStart'), btnBackSetup: $('#btnBackSetup'),
    playerNo: $('#playerNo'), btnReveal: $('#btnReveal'), btnHideNext: $('#btnHideNext'),

  // 60 สถานที่ (แต่ละที่มีบทบาทย่อยสูงสุด 9 รายการ — ใช้จริงจะสุ่มแค่ 8 อันดับแรก)

    { name: 'โรงพยาบาล', roles: ['แพทย์เวร','พยาบาล','ผู้ป่วย','ญาติผู้ป่วย','พนักงานเปล','เภสัชกร','แม่บ้านทำความสะอาด','เจ้าหน้าที่ฉุกเฉิน','ผู้ป่วยนอก'] },

    { name: 'ตลาดน้ำ', roles: ['พ่อค้าเรือ','นักท่องเที่ยว','แม่ค้าผลไม้','คนพายเรือ','นักดนตรีเปิดหมวก','ช่างภาพ','พนักงานท่าเรือ','แม่ครัวเรือ','ผู้ซื้อ'] },

    { name: 'ออฟฟิศ', roles: ['ผู้จัดการ','พนักงานใหม่','เลขานุการ','ช่างไอที','แม่บ้านทำความสะอาด','การเงิน','HR','แมสเซนเจอร์','พนักงานคลัง'] },

    { name: 'โรงงานขนม', roles: ['เชฟขนมหวาน','บรรจุสินค้า','ผู้ชิมคุณภาพ','ผจก.สายการผลิต','คลังสินค้า','ช่างซ่อมเครื่องจักร','ออกแบบแพ็กเกจ','แม่บ้านโรงงาน','QC'] },

  ];

  let state = null;

  function newRound(){
    const n = parseInt(el.players.value||'4',10);
    const loc = LOCATIONS[Math.floor(Math.random() * LOCATIONS.length)];
    const mode = el.spyMode ? el.spyMode.value : '1';
    const spyCount = Math.max(1, Math.min(3, parseInt(mode,10)||1));
    const spyIdxs = shuffle(Array.from({length:n}, (_,i)=>i)).slice(0, spyCount);
    const sub = shuffle(loc.roles.slice(0, 8)); // ใช้สูงสุด 8 บทบาท
    const roles = Array.from({length:n}, (_,i)=>{
      if (spyIdxs.includes(i)) {
        const spyNo = spyIdxs.indexOf(i)+1;
        return { title:`คุณคือ สายลับ #${spyNo} 🕵️`, desc:'คุณไม่รู้สถานที่ พยายามทายให้ถูก' };
      }
      const mySub = sub[i % sub.length] || 'ผู้ที่อยู่ในบริเวณนั้น';
      return { title:`สถานที่: ${loc.name} — บทบาท: ${mySub}`, desc:`คุณอยู่ที่ “${loc.name}” และเป็น “${mySub}” อย่าตอบโจ่งแจ้ง ให้ใบ้อย่างแนบเนียน` };
    });
    state = { n, spyIdxs, roles, current:0 };
    showOnly('pass'); updatePass();
  }

  function updatePass(){ el.playerNo.textContent = `คนที่ ${state.current+1}`; }

  function reveal(){
    const r = state.roles[state.current];
    el.roleTitle.textContent = r.title;
    el.roleDesc.textContent = r.desc;
    el.roleBadge.textContent = `ผู้เล่นคนที่ ${state.current+1}`;
    showOnly('reveal');
  }

  function hideAndNext(){
    state.current++;
    if (state.current >= state.n){ showOnly('ready'); }
    else { showOnly('pass'); updatePass(); }
  }

  function showSpy(){
    if (!state) return;
    const spies = state.spyIdxs.map(i => `ผู้เล่นลำดับที่ ${i+1}`).join(', ');
    el.spyReveal.textContent = `สายลับคือ: ${spies}`;
    el.spyReveal.classList.remove('hidden');
  }

  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function showOnly(id){ for (const sec of ['setup','pass','reveal','ready']){ document.getElementById(sec).classList.toggle('hidden', sec!==id); } }

  el.btnStart.addEventListener('click', newRound);
  el.footerNewRound.addEventListener('click', newRound);
  el.footerReset.addEventListener('click', ()=>{ showOnly('setup'); });
  el.btnBackSetup.addEventListener('click', ()=> showOnly('setup'));
  el.btnReveal.addEventListener('click', reveal);
  el.btnHideNext.addEventListener('click', hideAndNext);
  el.btnReset.addEventListener('click', ()=> showOnly('setup'));
  el.btnShowSpy.addEventListener('click', showSpy);
})();
</script>
